<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baldur's Gate 3 — Build Compendium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #100d17;
    --bg-vignette: radial-gradient(ellipse 90% 60% at 50% -10%, #241a35 0%, #100d17 55%);
    --surface: #1a1626;
    --surface-2: #221c33;
    --border: #352c4a;
    --border-soft: #2a2338;
    --text: #ece7f5;
    --text-dim: #b4a8cc;
    --text-faint: #79708f;
    --gold: #c9a54a;

    --accent: #9d7fd1;
    --accent-soft: rgba(157,127,209,0.14);
    --accent-line: rgba(157,127,209,0.35);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg-vignette);
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 28px 20px 80px;
  }

  .wrap{ max-width: 980px; margin: 0 auto; }

  /* ---------- Masthead ---------- */
  .masthead{ text-align:center; margin-bottom: 28px; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
    color: var(--gold); opacity:0.85; margin-bottom:10px;
  }
  .masthead h1{
    font-family:'Cinzel', serif; font-weight:700;
    font-size: clamp(28px, 5vw, 42px);
    margin: 0 0 8px;
    background: linear-gradient(135deg, #f3ecff 0%, var(--gold) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing: 0.01em;
  }
  .masthead p{
    color: var(--text-dim); font-size:14px; max-width:520px; margin: 0 auto;
  }

  /* ---------- Build selector ("character select") ---------- */
  .build-select{
    display:grid; grid-template-columns: repeat(4,1fr); gap:10px;
    margin: 26px 0 22px;
  }
  @media (max-width: 720px){ .build-select{ grid-template-columns: repeat(2,1fr);} }

  .build-btn{
    position:relative;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 14px 12px 12px;
    cursor:pointer;
    text-align:left;
    color: var(--text);
    transition: border-color .18s ease, transform .18s ease, background .18s ease;
    overflow:hidden;
  }
  .build-btn::before{
    content:"";
    position:absolute; inset:0;
    background: radial-gradient(circle at 20% 0%, var(--btn-accent-soft), transparent 60%);
    opacity:0; transition: opacity .2s ease;
  }
  .build-btn:hover{ transform: translateY(-2px); border-color: var(--btn-accent-line); }
  .build-btn:hover::before{ opacity:1; }
  .build-btn.active{
    border-color: var(--btn-accent);
    background: linear-gradient(180deg, var(--btn-accent-soft), var(--surface) 70%);
  }
  .build-tag{
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.14em;
    text-transform:uppercase; color: var(--btn-accent); opacity:.9; display:block; margin-bottom:4px;
  }
  .build-name{ font-family:'Cinzel',serif; font-weight:600; font-size:15px; display:block; line-height:1.25;}
  .build-sub{ font-size:11px; color:var(--text-faint); margin-top:3px; display:block; }

  /* ---------- Build header banner ---------- */
  .banner{
    border:1px solid var(--border);
    border-radius:16px;
    background: linear-gradient(160deg, var(--accent-soft), var(--surface) 60%);
    padding: 22px 24px;
    margin-bottom: 18px;
  }
  .banner-top{ display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap;}
  .banner h2{
    font-family:'Cinzel',serif; font-size: clamp(22px,3.4vw,30px); margin:0;
    color: var(--text);
  }
  .banner h2 .codename{ color: var(--accent); }
  .banner-theme{ font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); font-family:'JetBrains Mono',monospace;}
  .banner p.tag{ color: var(--text-dim); font-size:14.5px; margin: 10px 0 0; max-width: 720px; line-height:1.55;}

  .pill-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
  .pill{
    font-size:12px; padding: 5px 11px; border-radius:999px;
    border:1px solid var(--accent-line); color: var(--text-dim);
    background: rgba(255,255,255,0.02);
  }
  .pill b{ color: var(--accent); font-weight:600; }

  /* ---------- Section tabs ---------- */
  .tabs{
    display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:18px;
    border-bottom: 1px solid var(--border-soft);
  }
  .tab-btn{
    background:transparent; border:none; color: var(--text-faint);
    font-family:'Inter',sans-serif; font-weight:600; font-size:13px;
    padding: 9px 14px; border-radius: 8px 8px 0 0; cursor:pointer; white-space:nowrap;
    position:relative; transition: color .15s ease;
  }
  .tab-btn:hover{ color: var(--text); }
  .tab-btn.active{ color: var(--text); }
  .tab-btn.active::after{
    content:""; position:absolute; left:6px; right:6px; bottom:-1px; height:2px;
    background: var(--accent); border-radius:2px;
  }

  #content{ min-height: 200px; }
  .section-fade{ animation: fadeIn .25s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  h3.block-title{
    font-family:'Cinzel',serif; font-size:16px; color:var(--accent);
    margin: 26px 0 12px; letter-spacing:.02em;
  }
  h3.block-title:first-child{ margin-top:0; }
  .lede{ color: var(--text-dim); font-size:14.5px; line-height:1.6; margin: 0 0 6px; }

  /* ---------- Class split bar ---------- */
  .split-bar{ display:flex; height:14px; border-radius:8px; overflow:hidden; border:1px solid var(--border); margin-top:14px;}
  .split-seg{ height:100%; }
  .split-legend{ display:flex; gap:16px; flex-wrap:wrap; margin-top:10px; }
  .split-legend div{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text-dim);}
  .split-legend .dot{ width:9px; height:9px; border-radius:3px; display:inline-block;}

  /* ---------- Race / recommended cards ---------- */
  .info-grid{ display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin-top:10px;}
  .info-card{
    background: var(--surface); border:1px solid var(--border-soft); border-radius:10px;
    padding: 12px 14px;
  }
  .info-card .k{ font-size:12px; color:var(--accent); font-weight:600; margin-bottom:4px; font-family:'JetBrains Mono',monospace; letter-spacing:.04em;}
  .info-card .v{ font-size:13.5px; color:var(--text-dim); line-height:1.5;}

  /* ---------- Ability score cards ---------- */
  .ability-grid{ display:grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-top:8px;}
  .ability-card{
    background: var(--surface); border:1px solid var(--border-soft); border-radius:12px;
    padding: 14px; transition: transform .15s ease, border-color .15s ease;
  }
  .ability-card:hover{ transform: translateY(-2px); border-color: var(--accent-line); }
  .ability-name{ font-size:11.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--text-faint); font-family:'JetBrains Mono',monospace;}
  .ability-score{ font-family:'Cinzel',serif; font-size:28px; color:var(--accent); margin: 4px 0 6px; font-weight:700;}
  .ability-reason{ font-size:12.5px; color:var(--text-dim); line-height:1.45; }

  /* ---------- Leveling timeline (accordion) ---------- */
  .timeline{ position:relative; margin-top:6px; padding-left: 22px; }
  .timeline::before{
    content:""; position:absolute; left:6px; top:6px; bottom:6px; width:2px;
    background: linear-gradient(var(--accent-line), transparent 96%);
  }
  .lvl-node{ position:relative; margin-bottom:10px; }
  .lvl-node::before{
    content:""; position:absolute; left:-22px; top:14px; width:9px; height:9px; border-radius:50%;
    background: var(--accent); box-shadow: 0 0 0 3px var(--bg), 0 0 10px var(--accent-line);
  }
  .lvl-head{
    width:100%; text-align:left; background: var(--surface); border:1px solid var(--border-soft);
    border-radius:10px; padding: 11px 14px; cursor:pointer; color: var(--text);
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    font-family:'Inter',sans-serif; transition: border-color .15s ease, background .15s ease;
  }
  .lvl-head:hover{ border-color: var(--accent-line); }
  .lvl-head .range{ font-weight:700; font-size:13.5px; }
  .lvl-head .chev{ color: var(--accent); transition: transform .2s ease; flex-shrink:0; font-size:12px;}
  .lvl-node.open .lvl-head .chev{ transform: rotate(90deg); }
  .lvl-node.open .lvl-head{ border-color: var(--accent-line); background: var(--accent-soft); }
  .lvl-body{ max-height:0; overflow:hidden; transition: max-height .28s ease; }
  .lvl-node.open .lvl-body{ max-height: 2200px; }
  .lvl-body-inner{ padding: 12px 6px 4px 16px; font-size:13.5px; color: var(--text-dim); line-height:1.65;}
  .lvl-body-inner ul{ margin:6px 0 10px 16px; padding:0;}
  .lvl-body-inner li{ margin-bottom:5px; }
  .lvl-body-inner strong{ color: var(--text); }
  .lvl-body-inner .feat-tag{
    display:inline-block; font-family:'JetBrains Mono',monospace; font-size:10.5px;
    background: var(--accent-soft); color:var(--accent); padding:2px 7px; border-radius:6px; margin-left:4px;
    vertical-align:middle;
  }

  /* ---------- Gear cards (hover / click to reveal note) ---------- */
  details.gear-group{ margin-bottom: 12px; border:1px solid var(--border-soft); border-radius:12px; background: var(--surface); overflow:hidden;}
  details.gear-group[open]{ border-color: var(--accent-line); }
  details.gear-group summary{
    list-style:none; cursor:pointer; padding: 13px 16px; font-family:'Cinzel',serif;
    font-size:14.5px; color: var(--text); display:flex; align-items:center; justify-content:space-between;
  }
  details.gear-group summary::-webkit-details-marker{ display:none; }
  details.gear-group summary::after{ content:"+"; color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:16px;}
  details.gear-group[open] summary::after{ content:"–"; }
  .gear-group-body{ padding: 4px 16px 16px; }
  .gear-note-para{ font-size:13.5px; color:var(--text-dim); line-height:1.6; padding: 0 16px 16px; margin-top:-6px;}

  .gear-cards{ display:grid; grid-template-columns: repeat(auto-fill,minmax(230px,1fr)); gap:9px; }
  .gear-card{
    background: var(--surface-2); border:1px solid var(--border-soft); border-radius:10px;
    padding: 11px 13px; cursor:pointer; -webkit-tap-highlight-color: transparent;
  }
  .gear-card .slot{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); }
  .gear-card .item{ font-size:13.5px; font-weight:600; color:var(--text); margin-top:3px; display:flex; align-items:center; gap:6px;}
  .gear-card .hint{ font-size:10.5px; color:var(--text-faint); margin-left:auto; font-family:'JetBrains Mono',monospace;}
  .gear-note{ max-height:0; overflow:hidden; transition: max-height .25s ease; }
  .gear-card.open .gear-note, .gear-card:focus-within .gear-note{ max-height: 300px; }
  @media (hover:hover){ .gear-card:hover .gear-note{ max-height:300px; } }
  .gear-note p{ font-size:12.5px; color: var(--text-dim); line-height:1.5; margin: 8px 0 0; padding-top:8px; border-top:1px dashed var(--border);}

  /* ---------- Strategy accordion ---------- */
  .strat-group{ margin-bottom:10px; border:1px solid var(--border-soft); border-radius:12px; background:var(--surface); overflow:hidden;}
  .strat-head{
    width:100%; text-align:left; background:transparent; border:none; cursor:pointer;
    padding: 13px 16px; color: var(--text); font-weight:700; font-size:14px;
    display:flex; justify-content:space-between; align-items:center; font-family:'Inter',sans-serif;
  }
  .strat-head .chev{ color:var(--accent); transition: transform .2s ease; }
  .strat-group.open .strat-head .chev{ transform: rotate(90deg); }
  .strat-body{ max-height:0; overflow:hidden; transition: max-height .28s ease;}
  .strat-group.open .strat-body{ max-height:1600px; }
  .strat-body-inner{ padding: 0 16px 16px; font-size:13.5px; color:var(--text-dim); line-height:1.65;}
  .strat-body-inner ol, .strat-body-inner ul{ margin:4px 0 0 18px; padding:0; }
  .strat-body-inner li{ margin-bottom:6px; }
  .strat-body-inner strong{ color:var(--text); }

  /* ---------- Takeaways ---------- */
  .takeaway-list{ display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .takeaway{
    background: var(--surface); border:1px solid var(--border-soft); border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 11px 14px; font-size:13.5px; color: var(--text-dim); line-height:1.55;
    transition: background .15s ease;
  }
  .takeaway:hover{ background: var(--accent-soft); color: var(--text); }
  .takeaway strong{ color: var(--text); }

  footer{ text-align:center; margin-top:34px; color: var(--text-faint); font-size:11.5px; font-family:'JetBrains Mono',monospace;}

  ::-webkit-scrollbar{ height:6px; width:6px;}
  ::-webkit-scrollbar-thumb{ background: var(--border); border-radius:3px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div class="eyebrow">Honor Mode Compatible · Levels 1–12</div>
    <h1>Baldur's Gate 3 — Build Compendium</h1>
    <p>Four full multiclass builds — pick a build below, then browse abilities, leveling, gear, and strategy.</p>
  </div>

  <div class="build-select" id="buildSelect"></div>

  <div class="banner" id="banner"></div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>

  <footer>Click gear cards or hover to reveal notes · Click a level range to expand it</footer>
</div>

<script>
/* ============================= DATA ============================= */
const builds = {
  A: {
    codename: "Death Reaper",
    subtitle: "Necrotic Death Cleric",
    tag: "Cleric / Wizard / Druid",

      theme: "Spellcasting necromancy build combining Death Domain Cleric, Necromancy Wizard, and Circle of Spores Druid.",

      {name:"Constitution", score:16, reason:"HP and concentration saves — this build relies on concentration spells."},
      {name:"Dexterity", score:14, reason:"Initiative."},
      {name:"Intelligence", score:12, reason:"Needed for the Wizard multiclass dip; grants an extra prepared spell."},
      {name:"Charisma", score:"Dump", reason:"Not needed."},
      {name:"Strength", score:"Dump", reason:"Not needed."},
    ],
    leveling: [
      { range:"Death Cleric — Levels 1–2", html:`
        <strong>Cantrips (each tied to a different save/roll):</strong>
        <ul>
          <li><strong>Toll the Dead</strong> — Wisdom save; good vs. low-Wisdom enemies.</li>
          <li><strong>Bone Chill</strong> — attack roll; good vs. low-AC enemies.</li>
          <li><strong>"Bursting Sunue"</strong> <span class="feat-tag">spelling per transcript</span> — Dexterity save, AoE, needs a corpse nearby.</li>

        <strong>Subclass feature — Reaper:</strong> lets you cast these cantrips at two targets with one action (applies broadly to necrotic cantrips/spells).<br><br>

      { range:"Level 3", html:`
        Unlocks Level 2 spell prep:
        <ul>
          <li><strong>Spiritual Weapon</strong> — must-have; weapon choice matters (Trident/Spear for gaping wounds if the enemy is bleed-immune, Mace to daze).</li>

      { range:"Level 4", html:`

      { range:"Level 5", html:`<strong>Spirit Guardians</strong> — core concentration nuke/AoE spell for the rest of the game.`},
      { range:"Level 6", html:`

        <strong>Subclass feature — Inescapable Destruction:</strong> bypasses resistance to necrotic damage (does not bypass full immunity).`},
      { range:"Level 7", html:`Level 4 spells unlock (mostly mediocre here); rotate Aid, Guardian of Faith, Revivify, Enhance Ability as situational preps.`},
      { range:"Level 8", html:`
        <strong>Feat: Dual Wielder</strong> <span class="feat-tag">FEAT</span> — sets up dual-staff play in Act 3 (can delay for +2 Wisdom via Ability Improvement if still mid-Act 2).<br><br>
        <strong>Class feature — Divine Strike (Necrotic):</strong> adds necrotic damage to weapon attacks — pairs with hand crossbows for bonus-action shots.`},

      { range:"Post Level 12 — Endgame scrolls", html:`

    gear: [
      { title:"Act 1", items:[
        {slot:"Weapon", item:"Melisandre/Mask Staff", note:"Boosts spell DC/attack. Alternative: \"Sarrows\" — bonus-action Thorn Whip that drags enemies and procs Touch of Death."},

        {slot:"Armor", item:"Luminous Armor", note:"Medium armor + Radiant Shockwave for more orb application."},
        {slot:"Helm", item:"Helmet of Grit (carried)", note:"Synergizes with Radiating Orbs — up to −9 stacks on enemy attack rolls, plus CON save bonus."},
        {slot:"Amulet", item:"Amulet of Misty Step (carried)", note:"Kept for the Spirit Guardians + Misty Step combo."},
        {slot:"Boots", item:"Boots of Stormy Clamour (carried)", note:"Kept for concentration protection."},
        {slot:"Cloak", item:"Cindermoth Cloak", note:"Synergizes with the helm's fire/radiant effect."},
        {slot:"Ranged", item:"Two Hand Crossbows", note:"Sets up Act 3 Divine Strike bonus-action shots."},
      ]},
      { title:"Act 3 — Full necrotic commitment", items:[
        {slot:"Main hand (staff)", item:"Staff of Arcane Blessing", note:"From the Mystic Carrion questline (South Baldur's Gate). BiS for the whole build — disadvantage on saves vs. your necro spells + free necromancy recast on kill, any level including 6th."},
        {slot:"Off-hand (staff)", item:"Markoheshkir", note:"Free spell/day + Cassera's Favor (free-cast Ray of Sickness at level 5, which can also proc the other staff's free-cast if it kills) — chains free level-6 spells; boosts spell DC/attack."},
        {slot:"Rings", item:"Callous Glow + Coruscation (carried)", note:"Kept from Act 2 for extra damage/debuff."},

/* ============================= STATE ============================= */
let currentBuild = 'A';
let currentSection = 'overview';
const sections = [
  {id:'overview', label:'Overview'},
  {id:'abilities', label:'Abilities'},
  {id:'leveling', label:'Leveling'},
  {id:'gear', label:'Gear'},
  {id:'strategy', label:'Strategy'},
  {id:'notes', label:'Takeaways'},
];

/* ============================= RENDER: build select ============================= */
function renderBuildSelect(){
  const el = document.getElementById('buildSelect');
  el.innerHTML = Object.keys(builds).map(id=>{
    const b = builds[id];
    const active = id===currentBuild ? 'active' : '';
    return `<button class="build-btn ${active}" data-build="${id}"
      style="--btn-accent:${b.accent}; --btn-accent-soft:${b.accentSoft}; --btn-accent-line:${b.accentLine};">
      <span class="build-tag">Build ${id} · ${b.tag}</span>
      <span class="build-name">"${b.codename}"</span>
      <span class="build-sub">${b.subtitle}</span>
    </button>`;
  }).join('');
  el.querySelectorAll('.build-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentBuild = btn.dataset.build;
      currentSection = 'overview';
      fullRender();
    });
  });
}

/* ============================= RENDER: banner ============================= */
function renderBanner(){
  const b = builds[currentBuild];
  document.documentElement.style.setProperty('--accent', b.accent);
  document.documentElement.style.setProperty('--accent-soft', b.accentSoft);
  document.documentElement.style.setProperty('--accent-line', b.accentLine);

  const splitPills = b.overview.split.map(s=>`<span class="pill"><b>${s.levels}</b> ${s.name}</span>`).join('');
  document.getElementById('banner').innerHTML = `
    <div class="banner-top">
      <h2>Build ${currentBuild}: "<span class="codename">${b.codename}</span>"</h2>
      <span class="banner-theme">${b.subtitle}</span>
    </div>
    <p class="tag">${b.overview.theme}</p>
    <div class="pill-row">${splitPills}<span class="pill">Recommended: <b>${b.overview.recommended.split(' — ')[0]}</b></span></div>
  `;
}

/* ============================= RENDER: tabs ============================= */
function renderTabs(){
  document.getElementById('tabs').innerHTML = sections.map(s=>
    `<button class="tab-btn ${s.id===currentSection?'active':''}" data-section="${s.id}">${s.label}</button>`
  ).join('');
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentSection = btn.dataset.section;
      renderTabs();
      renderContent();
    });
  });
}

/* ============================= RENDER: content dispatch ============================= */
function renderContent(){
  const b = builds[currentBuild];
  const c = document.getElementById('content');
  let html = '';
  if(currentSection==='overview') html = renderOverview(b);
  else if(currentSection==='abilities') html = renderAbilities(b);
  else if(currentSection==='leveling') html = renderLeveling(b);
  else if(currentSection==='gear') html = renderGear(b);
  else if(currentSection==='strategy') html = renderStrategy(b);
  else if(currentSection==='notes') html = renderNotes(b);
  c.innerHTML = `<div class="section-fade">${html}</div>`;
  attachInteractivity();
}

function shadeList(n){
  // returns n visually distinct opacities of the accent for the split bar
  const base = [1, 0.7, 0.45, 0.28];
  return base.slice(0,n);
}

function renderOverview(b){
  const total = b.overview.split.reduce((a,s)=>a+s.levels,0);
  const shades = shadeList(b.overview.split.length);
  const bar = b.overview.split.map((s,i)=>
    `<div class="split-seg" style="width:${(s.levels/total*100).toFixed(1)}%; background:${b.accent}; opacity:${shades[i]};" title="${s.name} — ${s.levels} levels"></div>`
  ).join('');
  const legend = b.overview.split.map((s,i)=>
    `<div><span class="dot" style="background:${b.accent}; opacity:${shades[i]};"></span>${s.name} — ${s.levels} lvl${s.levels>1?'s':''}</div>`
  ).join('');

  const racesHtml = b.overview.races.length ? `
    <h3 class="block-title">Race Options</h3>
    <div class="info-grid">
      ${b.overview.races.map(r=>`<div class="info-card"><div class="k">${r.name}</div><div class="v">${r.note}</div></div>`).join('')}
    </div>` : '';

  const noteBlock = b.overview.note ? `<p class="lede" style="margin-top:14px; font-size:13px; opacity:.85;"><em>${b.overview.note}</em></p>` : '';
  const whySplit = b.overview.whySplit ? `<h3 class="block-title">Why This Split</h3><p class="lede">${b.overview.whySplit}</p>` : '';

  return `
    <h3 class="block-title">Playstyle</h3>
    <p class="lede">${b.overview.playstyle}</p>
    ${noteBlock}

    <h3 class="block-title">Final Class Split — Level 12</h3>
    <div class="split-bar">${bar}</div>
    <div class="split-legend">${legend}</div>
    ${whySplit}

    <h3 class="block-title">Recommended Character</h3>
    <div class="info-grid">
      <div class="info-card"><div class="k">Companion pick</div><div class="v">${b.overview.recommended}</div></div>
    </div>
    ${racesHtml}
  `;
}

function renderAbilities(b){
  if(!b.abilities.length){
    return `<p class="lede">No dedicated ability-score spread is given for this build in the source material — see Part 1 of this build's guide for the full leveling context.</p>`;
  }
  return `
    <h3 class="block-title">Ability Scores</h3>
    <div class="ability-grid">
      ${b.abilities.map(a=>`
        <div class="ability-card">
          <div class="ability-name">${a.name}</div>
          <div class="ability-score">${a.score}</div>
          <div class="ability-reason">${a.reason}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderLeveling(b){
  return `
    <h3 class="block-title">Level-by-Level Progression</h3>
    <div class="timeline">
      ${b.leveling.map((l,i)=>`
        <div class="lvl-node ${i===0?'open':''}">
          <button class="lvl-head" data-lvl="${i}">
            <span class="range">${l.range}</span>
            <span class="chev">▶</span>
          </button>
          <div class="lvl-body">
            <div class="lvl-body-inner">${l.html}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderGear(b){
  return `
    <h3 class="block-title">Gear by Act</h3>
    ${b.gear.map((g,gi)=>{
      const introHtml = g.intro ? `<p class="gear-note-para">${g.intro}</p>` : '';
      let body = '';
      if(g.items){
        body = `<div class="gear-group-body"><div class="gear-cards">
          ${g.items.map(it=>`
            <div class="gear-card" tabindex="0">
              <div class="slot">${it.slot}</div>
              <div class="item">${it.item} <span class="hint">tap / hover ⓘ</span></div>
              <div class="gear-note"><p>${it.note}</p></div>
            </div>
          `).join('')}
        </div></div>`;
      } else if(g.note){
        body = `<p class="gear-note-para">${g.note}</p>`;
      }
      return `<details class="gear-group" ${gi===0?'open':''}>
        <summary>${g.title}</summary>
        ${introHtml}
        ${body}
      </details>`;
    }).join('')}
    ${b.scrolls ? renderScrolls(b) : ''}
  `;
}

function renderScrolls(b){
  return `
    <h3 class="block-title">Bonus: Scribed Wizard Scrolls (Sorcerous Sundries)</h3>
    <p class="lede">Any spell scroll found can be permanently scribed into the spellbook and freely prepared/swapped — unlike a Sorcerer's fixed known-spell list.</p>
    <div class="gear-cards" style="margin-top:10px;">
      ${b.scrolls.map(s=>`
        <div class="gear-card" tabindex="0">
          <div class="slot">Scroll</div>
          <div class="item">${s.name} <span class="hint">tap / hover ⓘ</span></div>
          <div class="gear-note"><p>${s.note}</p></div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderStrategy(b){
  return `
    <h3 class="block-title">Combat Strategy</h3>
    ${b.strategy.map((s,i)=>`
      <div class="strat-group ${i===0?'open':''}">
        <button class="strat-head" data-strat="${i}">
          ${s.title}
          <span class="chev">▶</span>
        </button>
        <div class="strat-body"><div class="strat-body-inner">${s.html}</div></div>
      </div>
    `).join('')}
  `;
}

function renderNotes(b){
  return `
    <h3 class="block-title">Key Takeaways</h3>
    <div class="takeaway-list">
      ${b.takeaways.map(t=>`<div class="takeaway">${t}</div>`).join('')}
    </div>
  `;
}

/* ============================= INTERACTIVITY ============================= */
function attachInteractivity(){
  document.querySelectorAll('.lvl-head').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      btn.closest('.lvl-node').classList.toggle('open');
    });
  });
  document.querySelectorAll('.strat-head').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      btn.closest('.strat-group').classList.toggle('open');
    });
  });
  document.querySelectorAll('.gear-card').forEach(card=>{
    card.addEventListener('click', ()=>{
      card.classList.toggle('open');
    });
    card.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' || e.key===' '){ e.preventDefault(); card.classList.toggle('open'); }
    });
  });
}

function fullRender(){
  renderBuildSelect();
  renderBanner();
  renderTabs();
  renderContent();
}

fullRender();
</script>
</body>
</html>
